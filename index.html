<script>

////////////////////////////////////////
// PREVENT ZOOMING
////////////////////////////////////////
document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gesturechange', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gestureend', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});


////////////////////////////////////////
// WRITE CALL ENTRIES TO PAGE. DISPLAY VOICEMAIL IF AVAILABLE
////////////////////////////////////////

writeEntriesToPage(calls);

function writeEntriesToPage(entriesList) {

  var entriesToWrite = '';

  for (let currentEntryAddress = 0; currentEntryAddress < entriesList.length; currentEntryAddress++) {

    if (entriesList[currentEntryAddress].display) {

      var voicemailInstructions = '';

      if (entriesList[currentEntryAddress].voicemail !== '') {
        voicemailInstructions =
        '<button style="padding:0px; padding-left:10px; background-color: transparent; border: none;" onclick="playVoicemail(' +
        '\'' + entriesList[currentEntryAddress].voicemail + '\',' +
        'this' +
        ')"><img width="33" height="33" src="play-button.png"></button>';
      }


      var callHandlingInstructions = '';

      if (entriesList[currentEntryAddress].privateAudio !== '' || entriesList[currentEntryAddress].publicAudio !== '') {
        callHandlingInstructions =
        'decoyNum="' +
        entriesList[currentEntryAddress].telNumber +
        '" onclick=\'startDecoyCall(this.textContent , this.getAttribute("decoyNum"))\'';
      } else {
        callHandlingInstructions = 'href="tel:' + entriesList[currentEntryAddress].telNumber + '"';
      }

      var captionInstructions = '';

      if (entriesList[currentEntryAddress].caption !== '') {
        captionInstructions =
        '<br><span class="caption">' +
        entriesList[currentEntryAddress].caption +
        '</span>';
      }

      entriesToWrite = entriesToWrite +
      voicemailInstructions +
      '<a class="contact" style="color:' +
      entriesList[currentEntryAddress].textColor +
      ';"' +
      callHandlingInstructions +
      '>' +
      entriesList[currentEntryAddress].name +
      '</a>' +
      captionInstructions +
      '<hr>';

    }

  }

  document.write(entriesToWrite);

}


////////////////////////////////////////
// START DECOY CALL
////////////////////////////////////////
function startDecoyCall(decoyName , decoyNum) {
  window.location.href = './keypad.html?decoyContactName=' + decoyName + '&decoyContactNum=' + decoyNum;
}

////////////////////////////////////////
// PLAY VOICEMAIL
////////////////////////////////////////
function playVoicemail(receivedVoicemail , playButtonReference) {

  const voicemailAudio = new Audio(receivedVoicemail + '.mp3');
  voicemailAudio.controls = false;

  voicemailAudio.addEventListener('ended', () => {
    playButtonReference.querySelector('img').src="play-button.png";
    playButtonReference.onclick = function() {
      voicemailAudio.play();
    };
  });

  voicemailAudio.addEventListener('playing', () => {
    playButtonReference.querySelector('img').src="stop-button.png";
    playButtonReference.onclick = function() {
      voicemailAudio.currentTime = voicemailAudio.duration;
    };
  });

  voicemailAudio.play();

}

</script>
