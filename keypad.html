<!DOCTYPE html>

<html>

<head>

<script src="data.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  
<title>Phone</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">


<style>
body {
    margin: 0 0 80px 0;
    overflow: hidden;
}

#container {
display: flex;
justify-content: center;
align-items: center;
}


.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    display: flex;
    overflow-x: auto;
}

.nav__link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    min-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 13px;
    color: #444444;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s ease-in-out;
}

.keyPadBtns {
    font-size:45px;
}

.keyPadLetters {
    font-size:20px;
}

.btnSize{
    height:80px;
    width:90px;
}

</style>



</head>
<body>


<div id="container">
<input disabled style="background-color: transparent; text-align: center; font-size:40px; border:none" id="callStatus" type="text"> <br>
</div>


<div id="container">
<input disabled style="background-color: transparent; text-align: center; font-size:40px; border:none" id="numberInputField" type="text">
</div>

<div style="justify-content: center; text-align: center; align-items: center;">
<div style="display:none; text-wrap:wrap; text-align: center; align-items: center; font-size:40px; border:none" id="decoyContactDisplay"></div>
</div>


<div id="numPad">

<div id="container">
<button class="btnSize" type="button" onclick=writeNumbers('1')><span class="keyPadBtns">1</span><br><span class="keyPadLetters" style="visibility:hidden;">A</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('2')><span class="keyPadBtns">2</span><br><span class="keyPadLetters">ABC</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('3')><span class="keyPadBtns">3</span><br><span class="keyPadLetters">DEF</span></button>
<br>
</div>

<div id="container">
<button class="btnSize" type="button" onclick=writeNumbers('4')><span class="keyPadBtns">4</span><br><span class="keyPadLetters">GHI</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('5')><span class="keyPadBtns">5</span><br><span class="keyPadLetters">JKL</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('6')><span class="keyPadBtns">6</span><br><span class="keyPadLetters">MNO</span></button>
<br>
</div>

<div id="container">
<button class="btnSize" type="button" onclick=writeNumbers('7')><span class="keyPadBtns">7</span><br><span class="keyPadLetters">PQRS</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('8')><span class="keyPadBtns">8</span><br><span class="keyPadLetters">TUV</span></button>
<button class="btnSize" type="button" onclick=writeNumbers('9')><span class="keyPadBtns">9</span><br><span class="keyPadLetters">WXYZ</span></button>
<br>
</div>

<div id="container">
<button class="btnSize" type="button" onclick=writeNumbers('+')><span class="keyPadBtns">+</span><br><span class="keyPadLetters"></span></button>
<button class="btnSize" type="button" onclick=writeNumbers('0')><span class="keyPadBtns">0</span><br><span class="keyPadLetters"></span></button>
<button class="btnSize" type="button" onclick=writeNumbers('#')><span class="keyPadBtns">#</span><br><span class="keyPadLetters"></span></button>
<br>
</div>

</div>

<br>

<div id="container">
<button style="visibility:hidden;">Clear</button>
<button style="visibility:hidden; width:1px">CLEAR</button>
<button id="calling-button" style="background-color: green; border: none; border-radius:20px" onclick="startCall();"><img id="calling-icon" width="80" height="80" src="./call-start.png"></button>
<button style="visibility:hidden; width:1px">CLEAR</button>
<button id="clearBtn" style="background-color: transparent; border: none; font-size:20px" onclick = refreshPage()>Clear</button>
</div>






<nav class="nav">
  <a href="./index.html" class="nav__link">
    <img src="./calls.png">
    <span class="nav__text">Calls</span>
  </a>
  <a href="./contacts.html" class="nav__link">
    <img src="./contacts.png">
    <span class="nav__text">Contacts</span>
  </a>
  <a style="background-color:lightgrey" onclick='refreshPage()' class="nav__link">
    <img src="./keypad.png">
    <span class="nav__text">Keypad</span>
  </a>
</nav>







<script>

var decoyCallInProgress = false;

////////////////////////////////////////
// PREVENT ZOOMING
////////////////////////////////////////
document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gesturechange', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gestureend', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});


////////////////////////////////////////
// HANDLES CONTACT INFO PASSED IN FROM URL PARAMETERS
////////////////////////////////////////
if (new URLSearchParams(location.search).has("decoyContactName")) {
  document.getElementById("numPad").style.display= "none";
  document.getElementById("numberInputField").style.display= "none";
  document.getElementById("decoyContactDisplay").style.display= "inline";
  document.getElementById("clearBtn").style.visibility = "hidden";
  document.getElementById("decoyContactDisplay").textContent = new URLSearchParams(location.search).get("decoyContactName");
  document.getElementById("numberInputField").value = new URLSearchParams(location.search).get("decoyContactNum");
}

////////////////////////////////////////
// DISPLAYS DIALED DIGITS ON SCREEN
////////////////////////////////////////
function writeNumbers(inputDigit) {
  if (decoyCallInProgress == false) {
    var currentInputData = document.getElementById("numberInputField");
    currentInputData.value = currentInputData.value + inputDigit;
  }
}

////////////////////////////////////////
// REFRESHES PAGE IF URL PARAMETERS DO NOT EXIST. ELSE NAVIGATES PAGE BACK TO ITSELF
////////////////////////////////////////
function refreshPage() {
  if (new URLSearchParams(location.search).has("decoyContactName")) {
    window.location.href = './keypad.html'
  } else {
    window.location.reload()
  }
}

////////////////////////////////////////
// PRESENTS DECOY CALLING INTERFACE
////////////////////////////////////////
function presentDecoyCallingInterface (dialingAudio) {
  decoyCallInProgress = true;
  document.getElementById("numPad").style.display= "inline";
  document.getElementById("decoyContactDisplay").style.textWrap = "nowrap";
  document.getElementById("calling-icon").src="call-end.png";
  document.getElementById("calling-button").style.backgroundColor = "red";
  document.getElementById("clearBtn").style.visibility = "hidden";
  document.getElementById("callStatus").value = "Call Started";
  document.getElementById("calling-button").onclick = refreshPage;
  setTimeout(refreshPage,107000);

  const audio = new Audio(dialingAudio + '.mp3');
  audio.addEventListener('ended', () => {refreshPage();});
  audio.play();
}

////////////////////////////////////////
// STARTS CALL
////////////////////////////////////////
function startCall () {

  var userEnteredTelNumber = document.getElementById("numberInputField").value;

  if (userEnteredTelNumber !== "") {

    var contactCard = contacts.find(obj => obj.telNumber === userEnteredTelNumber);

    if (environmentStatus == "private") {
      if (contactCard === undefined) {
        presentDecoyCallingInterface('standard');
      } else if (contactCard.privateAudio !== "") {
        presentDecoyCallingInterface(contactCard.privateAudio);
      } else {
        window.location.href = "tel:" + userEnteredTelNumber;
      }
    } else if (environmentStatus == "public") {
      if (contactCard === undefined) {
        window.location.href = "tel:" + userEnteredTelNumber;
      } else if (contactCard.publicAudio !== "") {
        presentDecoyCallingInterface(contactCard.publicAudio);
      } else {
        window.location.href = "tel:" + userEnteredTelNumber;
      }
    }

  }

}

</script>

</body> 
</html>
