<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  
<title>Phone</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">


<style>
body {
    margin: 0 0 80px 0;
    overflow: hidden;
}

#container {
display: flex;
justify-content: center;
}


.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    display: flex;
    overflow-x: auto;
}

.nav__link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    min-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 13px;
    color: #444444;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s ease-in-out;
}
</style>



</head>
<body>

<audio id="audio" src="ring.mp3" onended="refreshpage()"></audio>





<div id="container">
<input disabled style="background-color: transparent; text-align: center; font-size:50px; border:none" id="calling" type="text"> <br>
</div>

<div id="container">
<input disabled style="background-color: transparent; text-align: center; font-size:50px; border:none" id="text" type="text"> <br>
</div>

<div id="container">
<button style="font-size:50px" id="one" type="button" onclick=writeNumbers(this)>1</button>
<button style="font-size:50px" id="two" type="button" onclick=writeNumbers(this)>2</button>
<button style="font-size:50px" id="three" type="button" onclick=writeNumbers(this)>3</button>
<br>
</div>

<div id="container">
<button style="font-size:50px" id="four" type="button" onclick=writeNumbers(this)>4</button>
<button style="font-size:50px" id="five" type="button" onclick=writeNumbers(this)>5</button>
<button style="font-size:50px" id="six" type="button" onclick=writeNumbers(this)>6</button>
<br>
</div>

<div id="container">
<button style="font-size:50px" id="seven" type="button" onclick=writeNumbers(this)>7</button>
<button style="font-size:50px" id="eight" type="button" onclick=writeNumbers(this)>8</button>
<button style="font-size:50px" id="nine" type="button" onclick=writeNumbers(this)>9</button>
<br>
</div>

<div id="container">
<button style="font-size:50px" id="star" type="button" onclick=writeNumbers(this)>*</button>
<button style="font-size:50px" id="zero" type="button" onclick=writeNumbers(this)>0</button>
<button style="font-size:50px" id="pound" type="button" onclick=writeNumbers(this)>#</button>
<br>
</div>

<br>

<div id="container">
<button id="calling-button" style="background-color: green; border: none; border-radius:20px" onclick="calling();"><img id="calling-icon" width="100" height="100" src="./call-start.png"></button>
</div>






<nav class="nav">
  <a href="./index.html" class="nav__link">
    <img src="./calls.png">
    <span class="nav__text">Calls</span>
  </a>
  <a href="./contacts.html" class="nav__link">
    <img src="./contacts.png">
    <span class="nav__text">Contacts</span>
  </a>
  <a style="background-color:lightgrey" href="./keypad.html" class="nav__link">
    <img src="./keypad.png">
    <span class="nav__text">Keypad</span>
  </a>
</nav>







<script>


document.addEventListener('gesturestart', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gesturechange', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gestureend', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});






function writeNumbers(el) {
var txt = document.getElementById("text");
var number = el.innerHTML;
txt.value = txt.value + number;          
}

function calling() {
var txt = document.getElementById("text");
var call = document.getElementById("calling");
if (txt.value !== "") {
document.getElementById("calling-icon").src="call-end.png";
document.getElementById("calling-button").style.backgroundColor = "red";
call.value = "Call Started";
audio.play();
document.getElementById("calling-button").onclick = refreshpage;
}              
}

function refreshpage() {
    window.location.reload();
}


</script>

</body> 
</html>
