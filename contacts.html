<!DOCTYPE html>

<html>

<head>

<script src="data.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  
<title>Phone</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">


<style>
body {
    margin: 0 0 80px 0;
}

.header {
  position: sticky;
  top: 0;
  background: lightgray;
  display: flex;
  justify-content: center;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    display: flex;
    overflow-x: auto;
}

.nav__link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    min-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 13px;
    color: #444444;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s ease-in-out;
}

.contact {
    text-decoration:none;
    font-weight:bold;
    font-size:40px;
    display:inline-block;
    padding-left:10px;
    padding-right:25px
}

.caption {
    font-size:20px;
    font-weight: bold;
    color:black;
    padding:10px
}

</style>



</head>
<body>


<div class="header"><h2>Contacts &#8203</h2><h2><a style="text-decoration:none; color:black;" href="./new.html">+</a></h2></div>

<div style = "display: flex; flex-flow: column wrap; align-items: center;">
<input searchBar placeholder="Search" style="width:80vw; font-size:25px; background: seashell;">
</div>

<script>

var totalEntriesCount = 0;

////////////////////////////////////////
// SEARCH BAR LOGIC
////////////////////////////////////////
document.querySelector("[searchBar]").addEventListener("input", e => {

var currentEntry = 1;

while (currentEntry <= totalEntriesCount){
  const inputTextValue = e.target.value.toLowerCase();
  var entryParentHTMLelement = document.getElementById('parent ' + String(currentEntry));
  var entryChildHTMLelement = document.getElementById('child ' + String(currentEntry));
  const entryValue = entryChildHTMLelement.innerHTML.toLowerCase();
  if (entryValue.includes(inputTextValue)) {
    entryParentHTMLelement.style.display = "inline";
  } else {
    entryParentHTMLelement.style.display = "none";
  }
  currentEntry++;
}

})

////////////////////////////////////////
// PREVENT ZOOMING
////////////////////////////////////////
document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gesturechange', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});
document.addEventListener('gestureend', function(e) {
  e.preventDefault();
  document.body.style.zoom = 0.99;});


////////////////////////////////////////
// SORT CONTACT ENTRIES
////////////////////////////////////////

const sortedContacts = contacts.sort((a,b) => a.name.localeCompare(b.name));


////////////////////////////////////////
// WRITE CONTACT ENTRIES TO PAGE
////////////////////////////////////////

writeEntriesToPage(sortedContacts);

function writeEntriesToPage(entriesList) {

  var entriesToWrite = '';

  for (let currentEntryAddress = 0; currentEntryAddress < entriesList.length; currentEntryAddress++) {

    if (entriesList[currentEntryAddress].display) {

      var callHandlingInstructions = '';

      if (entriesList[currentEntryAddress].privateAudio !== '' || entriesList[currentEntryAddress].publicAudio !== '') {
        callHandlingInstructions =
        'decoyNum="' +
        entriesList[currentEntryAddress].telNumber +
        '" onclick=\'requestDecoyCall(this.textContent , this.getAttribute("decoyNum"))\'';
      } else {
        callHandlingInstructions = 'href="tel:' + entriesList[currentEntryAddress].telNumber + '"';
      }

      var captionInstructions = '';

      if (entriesList[currentEntryAddress].caption !== '') {
        captionInstructions =
        '<br><span class="caption">' +
        entriesList[currentEntryAddress].caption +
        '</span>';
      }

      totalEntriesCount++;

      entriesToWrite = entriesToWrite +
      '<div id="parent ' + totalEntriesCount + '">' +
      '<a id="child ' + totalEntriesCount + '" ' +
      'class="contact" style="color:' +
      entriesList[currentEntryAddress].textColor +
      ';"' +
      callHandlingInstructions +
      '>' +
      entriesList[currentEntryAddress].name +
      '</a>' +
      captionInstructions +
      '<hr>' +
      '</div>';

    }

  }

  document.write(entriesToWrite);

}


////////////////////////////////////////
// REQUESTS DECOY CALL
////////////////////////////////////////
function requestDecoyCall(decoyName , decoyNum) {
    window.location.href = './keypad.html?decoyContactName=' + decoyName + '&decoyContactNum=' + encodeURIComponent(decoyNum);
}



</script>


<nav class="nav">
  <a href="./index.html" class="nav__link">
    <img src="./calls.png">
    <span class="nav__text">Calls</span>
  </a>
  <a style="background-color:lightgrey" onclick='window.location.reload()' class="nav__link">
    <img src="./contacts.png">
    <span class="nav__text">Contacts</span>
  </a>
  <a href="./keypad.html" class="nav__link">
    <img src="./keypad.png">
    <span class="nav__text">Keypad</span>
  </a>
</nav>

</body> 
</html>
