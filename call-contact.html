<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  
<title>Phone</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">


<style>
body {
    margin: 0 0 80px 0;
    overflow: hidden;
}

#container {
display: flex;
justify-content: center;
align-items: center;
}


.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    display: flex;
    overflow-x: auto;
}

.nav__link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    min-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 13px;
    color: #444444;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s ease-in-out;
}

.keyPadBtns {
    font-size:40px;
}

</style>



</head>
<body>

<audio id="audio" src="ring.mp3" onended="goToKeypad()"></audio>





<div style="text-wrap:wrap; text-align: center; font-size:50px;" id="calling"></div> <br>
<div style="text-wrap:wrap; text-align: center; font-size:50px;" id="text"></div> <br>

<div id="numPad" style="display:none">

<div id="container">
<button class="keyPadBtns" id="one" type="button">1</button>
<button class="keyPadBtns" id="two" type="button">2</button>
<button class="keyPadBtns" id="three" type="button">3</button>
<br>
</div>

<div id="container">
<button class="keyPadBtns" id="four" type="button">4</button>
<button class="keyPadBtns" id="five" type="button">5</button>
<button class="keyPadBtns" id="six" type="button">6</button>
<br>
</div>

<div id="container">
<button class="keyPadBtns" id="seven" type="button">7</button>
<button class="keyPadBtns" id="eight" type="button">8</button>
<button class="keyPadBtns" id="nine" type="button">9</button>
<br>
</div>

<div id="container">
<button class="keyPadBtns" id="star" type="button">+</button>
<button class="keyPadBtns" id="zero" type="button">0</button>
<button class="keyPadBtns" id="pound" type="button">#</button>
<br>
</div>

</div>

<br>

<div id="container">
<button id="calling-button" style="background-color: green; border: none; border-radius:20px" onclick="calling();"><img id="calling-icon" width="80" height="80" src="./call-start.png"></button>
</div>






<nav class="nav">
  <a href="./index.html" class="nav__link">
    <img src="./calls.png">
    <span class="nav__text">Calls</span>
  </a>
  <a href="./contacts.html" class="nav__link">
    <img src="./contacts.png">
    <span class="nav__text">Contacts</span>
  </a>
  <a style="background-color:lightgrey" href="./keypad.html" class="nav__link">
    <img src="./keypad.png">
    <span class="nav__text">Keypad</span>
  </a>
</nav>







<script>

document.addEventListener('gesturestart', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gesturechange', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gestureend', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});


var contactParam = new URLSearchParams(location.search).get("contactDetails");
showContactName(contactParam);
function showContactName(contactName) {
document.getElementById("text").textContent = contactName;
}



function calling() {

document.getElementById("calling").textContent = "Call Started";
document.getElementById("text").style.textWrap = "nowrap";
document.getElementById("numPad").style.display= "inline";
document.getElementById("calling-icon").src="call-end.png";
document.getElementById("calling-button").style.backgroundColor = "red";
audio.play();
document.getElementById("calling-button").onclick = goToKeypad;
setTimeout(goToKeypad,107000);


}

function goToKeypad() {
    window.location.href = './keypad.html';
}

</script>

</body> 
</html>
