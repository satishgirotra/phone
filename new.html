<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  
<title>Phone</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">


<style>
body {
    margin: 0 0 80px 0;
}

.header {
  position: sticky;
  top: 0;
  background: lightgray;
  display: flex;
  justify-content: center;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    background-color: #ffffff;
    display: flex;
    overflow-x: auto;
}

.nav__link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-grow: 1;
    min-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 13px;
    color: #444444;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s ease-in-out;
}
</style>



</head>
<body>

<div class="header" id="myHeader"><h2>Create New Contact</h2></div>

<span id="name" style="display: flex; justify-content: center; text-align:center; font-size:40px;">Enter Name:</span></br>
<div id="nameInput" style="display: flex; justify-content: center;"><input style="font-size:40px;" id="calling" type="text"></div> <br><br>
<span id="number" style="display: flex; justify-content: center; text-align:center; font-size:40px;">Enter Phone Number:</span></br>
<div id="numberInput" style="display: flex; justify-content: center;"><input style="font-size:40px;" id="calling" type="text"></div> <br>
<div id="submitBtn" style="display: flex; justify-content: center;"><button onclick="submitted();" style="font-size:20px;">Submit</button></div>



<nav class="nav">
  <a href="./index.html" class="nav__link">
    <img src="./calls.png">
    <span class="nav__text">Calls</span>
  </a>
  <a style="background-color:lightgrey" href="./contacts.html" class="nav__link">
    <img src="./contacts.png">
    <span class="nav__text">Contacts</span>
  </a>
  <a href="./keypad.html" class="nav__link">
    <img src="./keypad.png">
    <span class="nav__text">Keypad</span>
  </a>
</nav>







<script>


document.addEventListener('gesturestart', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gesturechange', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});

document.addEventListener('gestureend', function(e) {
    e.preventDefault();
    document.body.style.zoom = 0.99;
});



function submitted() {
    document.getElementById("nameInput").style.display = "none";
    document.getElementById("numberInput").style.display = "none";
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("name").textContent = "New contact added successfully.";
    document.getElementById("number").textContent = "Please allow some time for contact list to update.";
}





</script>

</body> 
</html>
